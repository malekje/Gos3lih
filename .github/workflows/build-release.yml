name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download WinDivert
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip" -OutFile WinDivert.zip
          Expand-Archive -Path WinDivert.zip -DestinationPath vendor
          echo "WINDIVERT_PATH=${{ github.workspace }}\vendor\WinDivert-2.2.2-A" >> $env:GITHUB_ENV

      - name: Download Npcap SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath vendor/npcap-sdk
          echo "LIB=${{ github.workspace }}\vendor\npcap-sdk\Lib\x64;${{ github.workspace }}\vendor\WinDivert-2.2.2-A\x64" >> $env:GITHUB_ENV

      - name: Build release binary
        run: cargo build --release

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          mkdir release-artifacts
          Copy-Item target/release/gos3lih-service.exe release-artifacts/

      - name: Extract version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.*)"').Matches.Groups[1].Value
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version-build.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Gos3lih ${{ steps.version.outputs.tag }}"
          body: |
            ## Gos3lih Auto-Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Build:** #${{ github.run_number }}

            ### How to install
            1. Download `gos3lih-service.exe`
            2. Right-click → **Run as Administrator**
            3. The dashboard opens automatically — discover devices and throttle bandwidth!

            > WinDivert drivers are bundled inside the exe and extracted automatically.
            > The application auto-updates — future releases will be applied automatically.
          files: |
            release-artifacts/gos3lih-service.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
