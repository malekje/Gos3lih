name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ui/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ui/src-tauri/Cargo.lock') }}

      - name: Download WinDivert
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip" -OutFile WinDivert.zip
          Expand-Archive -Path WinDivert.zip -DestinationPath vendor
          echo "WINDIVERT_PATH=${{ github.workspace }}\vendor\WinDivert-2.2.2-A" >> $env:GITHUB_ENV

      - name: Download Npcap SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath vendor/npcap-sdk
          echo "LIB=${{ github.workspace }}\vendor\npcap-sdk\Lib\x64;${{ github.workspace }}\vendor\WinDivert-2.2.2-A\x64" >> $env:GITHUB_ENV

      - name: Build Tauri app (single exe with embedded backend)
        shell: pwsh
        env:
          WINDIVERT_PATH: ${{ github.workspace }}\vendor\WinDivert-2.2.2-A
          LIB: ${{ github.workspace }}\vendor\npcap-sdk\Lib\x64;${{ github.workspace }}\vendor\WinDivert-2.2.2-A\x64
        run: |
          cd ui
          npm install
          npx tauri build

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-artifacts | Out-Null
          Copy-Item ui/src-tauri/target/release/gos3lih.exe release-artifacts/
          Copy-Item vendor/WinDivert-2.2.2-A/x64/WinDivert.dll release-artifacts/
          Copy-Item vendor/WinDivert-2.2.2-A/x64/WinDivert64.sys release-artifacts/
          Compress-Archive -Path release-artifacts/* -DestinationPath Gos3lih.zip

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path ui/src-tauri/Cargo.toml -Pattern '^version = "(.*)"').Matches.Groups[1].Value
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version-build.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Gos3lih ${{ steps.version.outputs.tag }}"
          body: |
            ## Gos3lih Auto-Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Build:** #${{ github.run_number }}

            ### How to install
            1. Download **`Gos3lih.zip`**
            2. **Extract** all 3 files into the same folder (e.g. `C:\Gos3lih\`)
            3. Install [Npcap](https://npcap.com/#download) (check **"WinPcap API-compatible Mode"**)
            4. Right-click **`gos3lih.exe`** → **Run as Administrator**

            > ⚠️ All 3 files must stay in the same folder: `gos3lih.exe`, `WinDivert.dll`, `WinDivert64.sys`
            > The application auto-updates — future releases will be applied automatically.
          files: |
            Gos3lih.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
